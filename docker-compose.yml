services:
  postgres:
    image: postgres:16-alpine
    container_name: dog-health-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dog_health_assistant}
      POSTGRES_USER: ${POSTGRES_USER:-dog_health_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_in_local_env}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}" -h 127.0.0.1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - dog_health_network

volumes:
  postgres_data:
    name: dog_health_postgres_data

networks:
  dog_health_network:
    name: dog_health_network
